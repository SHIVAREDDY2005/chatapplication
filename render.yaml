services:
  - type: web
    name: mern-chat-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
